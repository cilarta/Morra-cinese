<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Morra Cinese</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <!-- Firebase Scripts (Compat Version per Realtime Database) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Space Grotesk', sans-serif; background: #0d0b14; color: #f0eefa; min-height: 100vh; }
    .card { background: #16121f; border: 1px solid #2a2440; border-radius: 1rem; padding: 1.5rem; }
    .btn { border: none; border-radius: 0.75rem; padding: 0.65rem 1.25rem; font-family: 'Orbitron', sans-serif; font-size: 0.85rem; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 0.4rem; transition: all 0.2s; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: #7c3aed; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #6d28d9; }
    .btn-accent { background: #059669; color: #fff; }
    .btn-accent:hover:not(:disabled) { background: #047857; }
    .btn-outline { background: transparent; color: #a89fc0; border: 1px solid #2a2440; }
    .btn-outline:hover:not(:disabled) { background: #1e1a2e; }
    .btn-full { width: 100%; padding: 0.85rem; font-size: 1rem; }
    .input { background: #1e1a2e; border: 1px solid #2a2440; border-radius: 0.75rem; padding: 0.75rem 1rem; color: #f0eefa; font-size: 1.1rem; text-align: center; width: 100%; outline: none; font-family: 'Space Grotesk', sans-serif; }
    .input:focus { border-color: #7c3aed; }
    .spinner { width: 2rem; height: 2rem; border: 4px solid #2a2440; border-top-color: #7c3aed; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.35s ease both; }
    @keyframes pulse-anim { 0%,100% { transform: scale(1); } 50% { transform: scale(1.12); } }
    .pulse { animation: pulse-anim 2s infinite; display: inline-block; }
    #app { min-height: 100vh; padding: 1.5rem 1rem; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .max-w { max-width: 56rem; width: 100%; }
    .max-w-sm { max-width: 24rem; width: 100%; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    @media (max-width: 640px) { .grid-2 { grid-template-columns: 1fr; } }
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; margin-bottom: 1.25rem; }
    .stat-card { background: #16121f; border: 1px solid #2a2440; border-radius: 0.75rem; padding: 0.9rem; text-align: center; }
    .stat-val { font-family: 'Orbitron', sans-serif; font-size: 1.6rem; font-weight: 700; }
    .player-row { display: flex; align-items: center; justify-content: space-between; padding: 0.65rem 0.75rem; border-radius: 0.75rem; border: 1px solid #2a2440; background: rgba(30,26,46,0.5); margin-bottom: 0.4rem; }
    .badge { border-radius: 0.4rem; padding: 0.2rem 0.6rem; font-size: 0.7rem; font-family: 'Orbitron', sans-serif; border: 1px solid; white-space: nowrap; }
    .badge-playing    { background: rgba(124,58,237,0.1); color: #a78bfa; border-color: rgba(124,58,237,0.3); }
    .badge-waiting    { background: rgba(251,191,36,0.1);  color: #fbbf24; border-color: rgba(251,191,36,0.3); }
    .badge-eliminated { background: rgba(239,68,68,0.1);   color: #ef4444; border-color: rgba(239,68,68,0.3); opacity:.6; }
    .badge-winner     { background: rgba(52,211,153,0.1);  color: #34d399; border-color: rgba(52,211,153,0.3); }
    .controls { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-top: 0.25rem; }
    .qr-wrap { display: flex; flex-direction: column; align-items: center; gap: 0.75rem; margin: 0.5rem 0; }
    .players-list { max-height: 380px; overflow-y: auto; }
    .section-title { font-family: 'Orbitron', sans-serif; font-size: 0.8rem; color: #a89fc0; margin-bottom: 0.75rem; }
    .btn-choice { background: #1e1a2e; border: 2px solid #3b2f5e; border-radius: 1rem; padding: 1rem; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 0.4rem; transition: all 0.2s; color: #a89fc0; font-size: 0.7rem; font-family: 'Space Grotesk', sans-serif; text-transform: uppercase; letter-spacing: 0.08em; }
    .btn-choice:hover { border-color: #7c3aed; background: rgba(124,58,237,0.1); transform: translateY(-4px); }
    .gradient-text { font-family: 'Orbitron', sans-serif; background: linear-gradient(90deg,#7c3aed,#34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .center { display: flex; align-items: center; justify-content: center; min-height: 40vh; }
  </style>
</head>
<body>
<div id="app"><div class="center"><div class="spinner"></div></div></div>

<script>
  // ── CONFIGURAZIONE FIREBASE ──────────────────────────────────
  const firebaseConfig = {
    apiKey: "AIzaSyBdcg1gpOz20nYKa8gKZYnG_tEXGaRCS3M",
    authDomain: "morra-cinese-9bbc3.firebaseapp.com",
    databaseURL: "https://morra-cinese-9bbc3-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "morra-cinese-9bbc3",
    storageBucket: "morra-cinese-9bbc3.firebasestorage.app",
    messagingSenderId: "708963074870",
    appId: "1:708963074870:web:1cc33f99a0b1b6eb6de997"
  };

  // Inizializza Firebase
  if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
  }
  const db = firebase.database();
  
  const GITHUB_URL = "https://cilarta.github.io/Morra-cinese";

  const urlParams = new URLSearchParams(window.location.search);
  const code = urlParams.get("code") || "";

  // ── FIREBASE API ROUTER (REALTIME DATABASE) ──────────────────
  async function api(action, params = {}) {
    try {
      if (action === 'createSession') {
        const newSession = { id: params.code, code: params.code, status: 'registration', current_round: 1, active_players: 0, total_players: 0 };
        await db.ref("sessions/" + params.code).set(newSession);
        return { session: newSession };
      } 
      else if (action === 'getSessionById') {
        const snapshot = await db.ref("sessions/" + params.id).once("value");
        return { session: snapshot.exists() ? snapshot.val() : null };
      } 
      else if (action === 'updateSession') {
        await db.ref("sessions/" + params.id).update(params.data);
        return { success: true };
      } 
      else if (action === 'deleteSession') {
        await db.ref("sessions/" + params.id).remove();
        return { success: true };
      } 
      else if (action === 'registerPlayer') {
        const pId = Math.random().toString(36).substring(2,10);
        const pData = { id: pId, name: params.name, session_code: params.session_code, status: 'waiting', current_round: 1, wins: 0, losses: 0, round_wins: 0, round_losses: 0 };
        await db.ref("players/" + pId).set(pData);
        return { player: pData };
      } 
      else if (action === 'getPlayer') {
        const snapshot = await db.ref("players/" + params.id).once("value");
        return { player: snapshot.exists() ? snapshot.val() : null };
      } 
      else if (action === 'getPlayers') {
        const snapshot = await db.ref("players").orderByChild("session_code").equalTo(params.session_code).once("value");
        const players = [];
        if (snapshot.exists()) {
          snapshot.forEach(childSnapshot => {
            players.push(childSnapshot.val());
          });
        }
        return { players };
      } 
      else if (action === 'updatePlayer') {
        await db.ref("players/" + params.id).update(params.data);
        return { success: true };
      } 
      else if (action === 'deletePlayer') {
        await db.ref("players/" + params.id).remove();
        return { success: true };
      }
    } catch (error) {
      console.error("Firebase API Error:", error);
      throw error;
    }
  }

  function setHTML(el, html) {
    if (el) el.innerHTML = html;
  }

  // ══════════════════════════════════════════════════════════════
  // HOST MODE
  // ══════════════════════════════════════════════════════════════
  const HOST = {
    session: null, players: [], poll: null, initialized: false,

    renderShell() {
      const s = this.session;
      const joinUrl = `${GITHUB_URL}/?code=${s.code}`;
      document.getElementById("app").innerHTML = `
        <div class="max-w fade-in">
          <div style="text-align:center;margin-bottom:2rem">
            <h1 class="gradient-text" style="font-size:2rem">✊✋✌️ MORRA CINESE</h1>
            <p style="color:#a89fc0;margin-top:0.3rem;font-size:0.9rem">Torneo a eliminazione • Al meglio di 5</p>
          </div>
          <div class="grid-2">
            <div>
              ${s.status === 'registration' ? `
              <div class="card" style="margin-bottom:1.25rem" id="qr-block">
                <div class="section-title">📱 SCANSIONA PER PARTECIPARE</div>
                <div class="qr-wrap">
                  <img src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${encodeURIComponent(joinUrl)}&bgcolor=ffffff&color=000000&qzone=1"
                       style="border-radius:0.75rem;background:#fff;padding:0.5rem" width="220" height="220"/>
                  <p style="color:#7c3aed;font-family:'Orbitron',sans-serif;font-weight:700;font-size:1.1rem">${s.code}</p>
                  <p style="font-size:0.68rem;color:#a89fc0;word-break:break-all;text-align:center;max-width:260px">${joinUrl}</p>
                </div>
              </div>` : ''}
              <div id="winner-block"></div>
              <div class="stats-grid">
                <div class="stat-card"><div class="stat-val" id="stat-total" style="color:#7c3aed">0</div><div style="font-size:0.72rem;color:#a89fc0;margin-top:0.2rem">Totali</div></div>
                <div class="stat-card"><div class="stat-val" id="stat-active" style="color:#34d399">0</div><div style="font-size:0.72rem;color:#a89fc0;margin-top:0.2rem">Attivi</div></div>
                <div class="stat-card"><div class="stat-val" id="stat-round" style="color:#fbbf24">1</div><div style="font-size:0.72rem;color:#a89fc0;margin-top:0.2rem">Round</div></div>
              </div>
              <div class="controls" id="controls-block"></div>
            </div>
            <div class="card">
              <div class="section-title" id="players-title">👥 GIOCATORI (0)</div>
              <div class="players-list" id="players-list"></div>
            </div>
          </div>
        </div>`;
      this.initialized = true;
      this.updateDynamic();
    },

    updateDynamic() {
      const s = this.session, p = this.players;
      if (!s || !this.initialized) return;

      const cur = s.current_round || 1;
      const playing = p.filter(x => x.status === 'playing');
      const winner = p.find(x => x.status === 'winner');
      const roundComplete = s.status === 'playing' && playing.length === 0 && !winner;
      const advanced = p.filter(x => x.status === 'waiting' && (x.current_round||1) > cur);

      const stTotal = document.getElementById('stat-total');
      const stActive = document.getElementById('stat-active');
      const stRound  = document.getElementById('stat-round');
      if (stTotal) stTotal.textContent = p.length;
      if (stActive) stActive.textContent = playing.length;
      if (stRound)  stRound.textContent  = cur;

      const wb = document.getElementById('winner-block');
      if (wb) {
        if (winner) {
          wb.innerHTML = `<div style="background:linear-gradient(135deg,rgba(52,211,153,0.08),rgba(124,58,237,0.08));border:1px solid rgba(52,211,153,0.3);border-radius:1rem;padding:1.5rem;text-align:center;margin-bottom:1.25rem">
            <div class="pulse" style="font-size:3.5rem">🏆</div>
            <h2 style="font-family:'Orbitron',sans-serif;color:#34d399;font-size:1.4rem;margin-top:0.5rem">${winner.name}</h2>
            <p style="color:#a89fc0;margin-top:0.3rem">Campione del Torneo!</p>
          </div>`;
        } else {
          wb.innerHTML = '';
        }
      }

      const cb = document.getElementById('controls-block');
      if (cb) {
        let ctrl = '';
        if (s.status === 'registration') {
          ctrl += `<button class="btn btn-accent" onclick="HOST.startGame()" ${p.length<1?'disabled':''}>▶ INIZIA TORNEO${p.length>0?' ('+p.length+')':''}</button>`;
        }
        if (roundComplete) {
          ctrl += `<button class="btn btn-primary" onclick="HOST.nextRound()">▶ AVVIA ROUND ${cur+1} (${advanced.length})</button>`;
        }
        ctrl += `<button class="btn btn-outline" onclick="HOST.reset()">↺ RESET</button>`;
        cb.innerHTML = ctrl;
      }

      const pl = document.getElementById('players-list');
      const pt = document.getElementById('players-title');
      if (pt) pt.textContent = `👥 GIOCATORI (${p.length})`;
      if (pl) {
        const order = { winner:0, playing:1, waiting:2, eliminated:3 };
        const sorted = [...p].sort((a,b) => (order[a.status]||4)-(order[b.status]||4));
        const bmap = {
          playing:    ['badge-playing',    '⚔️ In gioco'],
          waiting:    ['badge-waiting',    '⏳ In attesa'],
          eliminated: ['badge-eliminated', '❌ Eliminato'],
          winner:     ['badge-winner',     '🏆 Vincitore'],
        };
        if (sorted.length === 0) {
          pl.innerHTML = `<p style="text-align:center;color:#a89fc0;padding:2rem;font-size:0.85rem">Nessun giocatore registrato</p>`;
        } else {
          pl.innerHTML = sorted.map(x => {
            const [cls, lbl] = bmap[x.status] || bmap.waiting;
            return `<div class="player-row" style="${x.status==='eliminated'?'opacity:0.5':''}">
              <div>
                <p style="font-size:0.88rem;font-weight:500">${x.name}</p>
                <p style="font-size:0.7rem;color:#a89fc0">Round ${x.current_round||1} • ${x.wins||0}V / ${x.losses||0}S</p>
              </div>
              <span class="badge ${cls}">${lbl}</span>
            </div>`;
          }).join('');
        }
      }
    },

    showStart() {
      document.getElementById("app").innerHTML = `
        <div class="max-w fade-in" style="text-align:center">
          <div style="margin-bottom:2rem">
            <h1 class="gradient-text" style="font-size:2rem">✊✋✌️ MORRA CINESE</h1>
            <p style="color:#a89fc0;margin-top:0.3rem;font-size:0.9rem">Torneo a eliminazione • Al meglio di 5</p>
          </div>
          <button class="btn btn-primary" style="font-size:1rem;padding:1rem 2rem" onclick="HOST.createSession()">⚡ NUOVA PARTITA</button>
        </div>`;
      this.initialized = false;
    },

    async createSession() {
      document.getElementById("app").innerHTML = `<div class="center"><div class="spinner"></div></div>`;
      const code = Math.random().toString(36).substring(2,8).toUpperCase();
      try {
        const { session } = await api('createSession', { code });
        this.session = session;
        this.players = [];
        localStorage.setItem('rps_host_session_id', session.id);
        this.renderShell();
        this.startPolling();
      } catch (error) {
        console.error("Errore di connessione API:", error);
        alert("Errore di comunicazione con Firebase. Controlla le regole e i dati di configurazione.");
        this.showStart(); 
      }
    },

    async startGame() {
      const waiting = this.players.filter(p => p.status === 'waiting');
      for (const p of waiting) await api('updatePlayer', { id: p.id, data: { status:'playing', current_round:1, round_wins:0, round_losses:0 } });
      await api('updateSession', { id: this.session.id, data: { status:'playing', total_players:waiting.length, active_players:waiting.length } });
      await this.refresh();
      this.renderShell();
    },

    async nextRound() {
      const cur = this.session.current_round || 1;
      const eligible = this.players.filter(p => p.status==='waiting' && (p.current_round||1) > cur);
      for (const p of eligible) await api('updatePlayer', { id: p.id, data: { status:'playing', round_wins:0, round_losses:0 } });
      await api('updateSession', { id: this.session.id, data: { current_round: cur+1, active_players: eligible.length } });
      await this.refresh();
      this.updateDynamic();
    },

    async reset() {
      if (!confirm('Resettare il torneo?')) return;
      document.getElementById("app").innerHTML = `<div class="center"><div class="spinner"></div></div>`;
      for (const p of this.players) await api('deletePlayer', { id: p.id });
      if (this.session) await api('deleteSession', { id: this.session.id });
      localStorage.removeItem('rps_host_session_id');
      this.session = null; this.players = []; this.initialized = false;
      if (this.poll) clearInterval(this.poll);
      this.showStart();
    },

    async refresh() {
      if (!this.session) return;
      const [sr, pr] = await Promise.all([
        api('getSessionById', { id: this.session.id }),
        api('getPlayers', { session_code: this.session.code })
      ]);
      this.session = sr.session;
      this.players = pr.players || [];
      if (this.session?.status === 'playing') {
        const sp = this.players.filter(p => p.status==='playing');
        const el = this.players.filter(p => p.status==='eliminated');
        const wt = this.players.filter(p => p.status==='waiting');
        if (sp.length===1 && el.length>0 && wt.length===0) {
          await api('updatePlayer', { id: sp[0].id, data: { status:'winner' } });
          await api('updateSession', { id: this.session.id, data: { status:'finished', winner_name: sp[0].name, active_players:1 } });
          await this.refresh();
        }
      }
    },

    startPolling() {
      if (this.poll) clearInterval(this.poll);
      this.poll = setInterval(async () => {
        await this.refresh();
        this.updateDynamic();
      }, 3000);
    },

    async init() {
      const saved = localStorage.getItem('rps_host_session_id');
      if (saved) {
        try {
          const { session } = await api('getSessionById', { id: saved });
          if (session) {
            this.session = session;
            await this.refresh();
            this.renderShell();
            this.startPolling();
            return;
          }
        } catch(e) {}
        localStorage.removeItem('rps_host_session_id');
      }
      this.showStart();
    }
  };

  // ══════════════════════════════════════════════════════════════
  // PLAYER MODE
  // ══════════════════════════════════════════════════════════════
  const PLAYER = {
    playerId: null, player: null, poll: null, isRevealing: false,
    currentScreen: null,
    CHOICES: ["rock","paper","scissors"],
    EMOJI: { rock:"🪨", paper:"📄", scissors:"✂️" },

    renderState(pendingResult) {
      const p = this.player;
      if (!p) { document.getElementById("app").innerHTML = `<div class="center"><div class="spinner"></div></div>`; return; }

      const newScreen = p.status;

      if (newScreen !== this.currentScreen) {
        this.currentScreen = newScreen;
        this._renderFull(p, pendingResult);
        return;
      }

      if (p.status === 'playing') {
        this._patchPlayingScreen(p, pendingResult);
      }
    },

    _renderFull(p, pendingResult) {
      if (p.status === 'waiting') {
        const hasPlayed = (p.current_round||1) > 1;
        document.getElementById("app").innerHTML = `<div class="max-w-sm fade-in">
          <div class="card" style="text-align:center;padding:2.5rem">
            <div class="pulse" style="font-size:4rem;margin-bottom:1rem">${hasPlayed?"🎉":"⏳"}</div>
            <h2 style="font-family:'Orbitron',sans-serif;font-size:1.1rem;margin-bottom:0.5rem">
              ${hasPlayed?`Round ${(p.current_round||1)-1} Vinto!`:`Ciao, ${p.name}!`}
            </h2>
            <p style="color:#a89fc0;font-size:0.88rem">
              ${hasPlayed?`Sei qualificato per il Round ${p.current_round||1}.<br>Attendi il prossimo round...`:"Sei registrato! Attendi che l'host avvii il torneo..."}
            </p>
          </div>
        </div>`;
        return;
      }
      if (p.status === 'eliminated') {
        document.getElementById("app").innerHTML = `<div class="max-w-sm fade-in">
          <div class="card" style="text-align:center;padding:2.5rem;border-color:rgba(239,68,68,0.3)">
            <div style="font-size:4rem;margin-bottom:1rem">❌</div>
            <h2 style="font-family:'Orbitron',sans-serif;font-size:1.5rem;color:#ef4444;margin-bottom:0.5rem">ELIMINATO</h2>
            <p style="color:#a89fc0">Mi dispiace, ${p.name}! Hai perso 3 mani.</p>
            <div style="margin-top:1rem;font-size:0.82rem;color:#a89fc0">
              Round raggiunto: <strong style="color:#f0eefa">${p.current_round||1}</strong><br>
              Vittorie totali: <strong style="color:#34d399">${p.wins||0}</strong>
            </div>
          </div>
        </div>`;
        return;
      }
      if (p.status === 'winner') {
        document.getElementById("app").innerHTML = `<div class="max-w-sm fade-in">
          <div class="card" style="text-align:center;padding:2.5rem;border-color:rgba(52,211,153,0.3);background:linear-gradient(135deg,rgba(52,211,153,0.05),rgba(124,58,237,0.05))">
            <div class="pulse" style="font-size:5rem">🏆</div>
            <h2 style="font-family:'Orbitron',sans-serif;font-size:2rem;color:#34d399;margin:0.75rem 0 0.4rem">HAI VINTO!</h2>
            <p style="color:#a89fc0">Complimenti ${p.name}, sei il campione! 🏆</p>
          </div>
        </div>`;
        (function fireConfetti() {
          const end = Date.now() + 4000;
          const colors = ['#7c3aed','#34d399','#fbbf24','#f0eefa'];
          (function frame() {
            confetti({ particleCount: 6, angle: 60,  spread: 55, origin: { x: 0 }, colors });
            confetti({ particleCount: 6, angle: 120, spread: 55, origin: { x: 1 }, colors });
            if (Date.now() < end) requestAnimationFrame(frame);
          })();
        })();
        return;
      }
      if (p.status === 'playing') {
        document.getElementById("app").innerHTML = `<div class="max-w-sm fade-in" id="playing-shell">
          <div style="text-align:center;margin-bottom:1rem">
            <h1 class="gradient-text" style="font-size:1.5rem">MORRA CINESE</h1>
            <p style="color:#a89fc0;font-size:0.82rem;margin-top:0.2rem">${p.name} • Al meglio di 5</p>
          </div>
          <div class="card" style="text-align:center;padding:1rem;margin-bottom:1rem">
            <p id="round-label" style="font-family:'Orbitron',sans-serif;font-size:0.68rem;color:#a89fc0;text-transform:uppercase;margin-bottom:0.5rem">Round ${p.current_round||1}</p>
            <div style="display:flex;align-items:center;justify-content:center;gap:1.5rem">
              <div><p style="font-size:0.62rem;color:#a89fc0;text-transform:uppercase;margin-bottom:0.3rem">Vittorie</p><div id="wins-dots"></div></div>
              <div style="width:1px;height:2rem;background:#2a2440"></div>
              <div><p style="font-size:0.62rem;color:#a89fc0;text-transform:uppercase;margin-bottom:0.3rem">Sconfitte</p><div id="losses-dots"></div></div>
            </div>
          </div>
          <div id="action-area"></div>
        </div>`;
        this._patchPlayingScreen(p, pendingResult);
      }
    },

    _patchPlayingScreen(p, pendingResult) {
      const rl = document.getElementById('round-label');
      const wd = document.getElementById('wins-dots');
      const ld = document.getElementById('losses-dots');
      const aa = document.getElementById('action-area');
      if (!aa) return;

      if (rl) rl.textContent = `Round ${p.current_round||1}`;
      if (wd) wd.innerHTML = Array.from({length:3},(_,i)=>`<span style="font-size:1.4rem">${i<(p.round_wins||0)?"🟢":"⚪"}</span>`).join('');
      if (ld) ld.innerHTML = Array.from({length:3},(_,i)=>`<span style="font-size:1.4rem">${i<(p.round_losses||0)?"🔴":"⚪"}</span>`).join('');

      if (pendingResult) {
        const rm = {
          win:  ['rgba(52,211,153,0.12)','#34d399','rgba(52,211,153,0.3)','HAI VINTO! 🎉'],
          lose: ['rgba(239,68,68,0.12)','#ef4444','rgba(239,68,68,0.3)','HAI PERSO! 😢'],
          draw: ['rgba(251,191,36,0.12)','#fbbf24','rgba(251,191,36,0.3)','PAREGGIO! 🤝']
        }[pendingResult.result];
        aa.innerHTML = `<div class="card fade-in" style="text-align:center;padding:1.5rem">
          <div style="display:flex;align-items:center;justify-content:center;gap:2rem;margin-bottom:1rem">
            <div><span style="font-size:3rem">${this.EMOJI[pendingResult.playerChoice]}</span><p style="font-size:0.7rem;color:#a89fc0;margin-top:0.25rem">Tu</p></div>
            <span style="font-family:'Orbitron',sans-serif;color:#a89fc0;font-size:0.8rem">VS</span>
            <div><span style="font-size:3rem">${this.EMOJI[pendingResult.computerChoice]}</span><p style="font-size:0.7rem;color:#a89fc0;margin-top:0.25rem">Computer</p></div>
          </div>
          <span style="border-radius:0.4rem;padding:0.35rem 1rem;font-size:0.9rem;font-family:'Orbitron',sans-serif;border:1px solid;background:${rm[0]};color:${rm[1]};border-color:${rm[2]}">${rm[3]}</span>
        </div>`;
      } else if (this.isRevealing) {
        aa.innerHTML = `<div class="card" style="text-align:center;padding:2rem"><div style="font-size:3.5rem;animation:pulse-anim 0.4s infinite;display:inline-block">✊</div></div>`;
      } else {
        aa.innerHTML = `<div class="card" style="text-align:center;padding:1.5rem">
          <p style="color:#a89fc0;font-size:0.72rem;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:1rem">Scegli la tua mossa</p>
          <div style="display:flex;gap:0.75rem;justify-content:center">
            <button class="btn-choice" onclick="PLAYER.choose('rock')"><span style="font-size:2.5rem">🪨</span>Sasso</button>
            <button class="btn-choice" onclick="PLAYER.choose('paper')"><span style="font-size:2.5rem">📄</span>Carta</button>
            <button class="btn-choice" onclick="PLAYER.choose('scissors')"><span style="font-size:2.5rem">✂️</span>Forbice</button>
          </div>
        </div>`;
      }
    },

    async choose(choice) {
      if (this.isRevealing || !this.player || this.player.status !== 'playing') return;
      this.isRevealing = true;
      this._patchPlayingScreen(this.player, null);
      await new Promise(r => setTimeout(r, 800));
      const comp = this.CHOICES[Math.floor(Math.random()*3)];
      const result = choice===comp ? 'draw'
        : ((choice==='rock'&&comp==='scissors')||(choice==='paper'&&comp==='rock')||(choice==='scissors'&&comp==='paper')) ? 'win' : 'lose';

      let rw=this.player.round_wins||0, rl=this.player.round_losses||0;
      let w=this.player.wins||0, l=this.player.losses||0;
      if (result==='win'){rw++;w++;} else if(result==='lose'){rl++;l++;}

      this._patchPlayingScreen(this.player, { playerChoice:choice, computerChoice:comp, result });

      let status=this.player.status, round=this.player.current_round||1;
      if (rw>=3){round++;rw=0;rl=0;status='waiting';} else if(rl>=3){status='eliminated';}

      setTimeout(async () => {
        const updated = { wins:w, losses:l, round_wins:rw, round_losses:rl, current_round:round, status };
        await api('updatePlayer', { id: this.player.id, data: updated });
        this.player = { ...this.player, ...updated };
        setTimeout(() => {
          this.isRevealing = false;
          this.renderState();
        }, 1500);
      }, 1200);
    },

    startPolling() {
      if (this.poll) clearInterval(this.poll);
      this.poll = setInterval(async () => {
        if (this.isRevealing) return;
        const { player } = await api('getPlayer', { id: this.playerId });
        if (player) {
          this.player = player;
          this.renderState();
        }
      }, 3000);
    },

    showRegister() {
      this.currentScreen = 'register';
      document.getElementById("app").innerHTML = `<div class="max-w-sm fade-in">
        <div class="card" style="padding:2rem">
          <div style="text-align:center;margin-bottom:1.5rem">
            <div style="font-size:3rem;margin-bottom:0.75rem">✊✋✌️</div>
            <h1 class="gradient-text" style="font-size:1.5rem">MORRA CINESE</h1>
            <p style="color:#a89fc0;font-size:0.82rem;margin-top:0.3rem">
              Sessione: <span style="color:#7c3aed;font-family:'Orbitron',sans-serif;font-weight:700">${code}</span>
            </p>
          </div>
          <input id="nameInput" class="input" placeholder="Il tuo nome..." maxlength="20" style="margin-bottom:1rem"/>
          <button id="joinBtn" class="btn btn-primary btn-full" disabled onclick="PLAYER.register()">➜ PARTECIPA</button>
        </div>
      </div>`;
      const inp = document.getElementById("nameInput");
      inp.addEventListener("input", () => { document.getElementById("joinBtn").disabled = !inp.value.trim(); });
      inp.addEventListener("keydown", e => { if(e.key==="Enter") document.getElementById("joinBtn").click(); });
      inp.focus();
    },

    async register() {
      const name = document.getElementById("nameInput").value.trim();
      if (!name) return;
      const btn = document.getElementById("joinBtn");
      btn.disabled = true;
      btn.innerHTML = `<div class="spinner" style="width:1rem;height:1rem;border-width:2px"></div> Iscrizione...`;
      try {
        const { player } = await api("registerPlayer", { name, session_code: code });
        localStorage.setItem(`rps_player_${code}`, player.id);
        this.playerId = player.id;
        this.player = player;
        this.currentScreen = null;
        this.startPolling();
        this.renderState();
      } catch (error) {
        console.error("Errore di registrazione API:", error);
        alert("Errore di comunicazione con Firebase durante la registrazione.");
        btn.disabled = false;
        btn.innerHTML = `➜ PARTECIPA`;
      }
    },

    async init() {
      const saved = localStorage.getItem(`rps_player_${code}`);
      if (saved) {
        try {
          const { player } = await api('getPlayer', { id: saved });
          if (player) {
            this.playerId = saved; this.player = player;
            this.startPolling(); this.renderState(); return;
          }
        } catch(e) {}
        localStorage.removeItem(`rps_player_${code}`);
      }
      this.showRegister();
    }
  };

  // ── ROUTER ────────────────────────────────────────────────────
  if (code) { PLAYER.init(); } else { HOST.init(); }
</script>
</body>
</html>
